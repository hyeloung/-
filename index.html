<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>대장내시경 장청결제 복용 안내</title>
    <link rel="stylesheet" href="style.css?v=25">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
    <div id="app">
        <div id="loading" class="loading">안내문을 불러오는 중입니다...</div>
        
        <div id="screen-container" class="screen-container hidden">
            <!-- Dynamic Custom Heading for page 16 -->
            <div id="bowel-heading" class="bowel-heading hidden">
                <span style="font-weight: normal;">정확한 검사를 위해서는 장을 깨끗이 비우는 것이 매우 중요합니다.</span><br>
                대장약 복용후 대변에 찌꺼기가 보이지 않더라도,<br>
                약은 안내받은 용량과 시간에 맞춰 끝까지 복용하셔야 합니다.
            </div>

            <!-- Wrapper to keep overlays aligned with canvas -->
            <div id="canvas-wrapper">
                <canvas id="pdf-canvas"></canvas>
                <img id="page1-img" class="hidden" src="page1.jpg?v=42" style="width: 100%; height: auto; display: block;" alt="Page 1">
                <img id="page2-img" class="hidden" src="page2.png?v=42" style="width: 100%; height: auto; display: block;" alt="Page 2">
                <img id="page4-img" class="hidden" src="page4.png?v=42" style="width: 100%; height: auto; display: block;" alt="Page 4">
                <img id="page5-img" class="hidden" src="page5.png?v=42" style="width: 100%; height: auto; display: block;" alt="Page 5">
                <img id="page6-img" class="hidden" src="page6.png?v=42" style="width: 100%; height: auto; display: block;" alt="Page 6">
                <img id="page7-img" class="hidden" src="page7.jpg?v=42" style="width: 100%; height: auto; display: block;" alt="Page 7">
                <img id="page8-img" class="hidden" src="page8.png?v=42" style="width: 100%; height: auto; display: block;" alt="Page 8">
                <img id="page9-img" class="hidden" src="page9.png?v=42" style="width: 100%; height: auto; display: block;" alt="Page 9">
                <img id="page10-img" class="hidden" src="page10.png?v=42" style="width: 100%; height: auto; display: block;" alt="Page 10">
                <img id="page11-img" class="hidden" src="page11.jpg?v=42" style="width: 100%; height: auto; display: block;" alt="Page 11">
                <img id="page12-img" class="hidden" src="page12.png?v=42" style="width: 100%; height: auto; display: block;" alt="Page 12">
                <img id="page13-img" class="hidden" src="page13.png?v=42" style="width: 100%; height: auto; display: block;" alt="Page 13">
                <img id="page14-img" class="hidden" src="page14.png?v=42" style="width: 100%; height: auto; display: block;" alt="Page 14">
                <img id="page15-img" class="hidden" src="page15.jpg?v=42" style="width: 100%; height: auto; display: block;" alt="Page 15">
                <img id="page16-img" class="hidden" src="page16.jpg?v=42" style="width: 100%; height: auto; display: block;" alt="Page 16">
                
                <!-- Overlay for Screen 1 & 2: Click anywhere to go next -->
                <div id="full-overlay" class="overlay hidden" onclick="goNext()">
                    <div class="tap-hint" id="tap-hint-text">화면을 터치하여 다음으로 넘어가세요</div>
                </div>
                
                <!-- Overlay for Screen 3: Click medicine -->
                <div id="med-overlay" class="overlay hidden">
                    <!-- 4 Rows x 3 Columns of medicines -->
                    <!-- 하프렙 (Row 1) -->
                    <div class="clickable-row" style="top: 32%; height: 16%; left: 0%; width: 33.33%;" onclick="showPage(4)"></div>
                    <div class="clickable-row" style="top: 32%; height: 16%; left: 33.33%; width: 33.33%;" onclick="showPage(8)"></div>
                    <div class="clickable-row" style="top: 32%; height: 16%; left: 66.66%; width: 33.33%;" onclick="showPage(12)"></div>
                    <!-- 플렌뷰 (Row 2) -->
                    <div class="clickable-row" style="top: 49%; height: 16%; left: 0%; width: 33.33%;" onclick="showPage(5)"></div>
                    <div class="clickable-row" style="top: 49%; height: 16%; left: 33.33%; width: 33.33%;" onclick="showPage(9)"></div>
                    <div class="clickable-row" style="top: 49%; height: 16%; left: 66.66%; width: 33.33%;" onclick="showPage(13)"></div>
                    <!-- 수프렙 (Row 3) -->
                    <div class="clickable-row" style="top: 66%; height: 16%; left: 0%; width: 33.33%;" onclick="showPage(6)"></div>
                    <div class="clickable-row" style="top: 66%; height: 16%; left: 33.33%; width: 33.33%;" onclick="showPage(10)"></div>
                    <div class="clickable-row" style="top: 66%; height: 16%; left: 66.66%; width: 33.33%;" onclick="showPage(14)"></div>
                    <!-- 원프렙 (Row 4) -->
                    <div class="clickable-row" style="top: 83%; height: 16%; left: 0%; width: 33.33%;" onclick="showPage(7)"></div>
                    <div class="clickable-row" style="top: 83%; height: 16%; left: 33.33%; width: 33.33%;" onclick="showPage(11)"></div>
                    <div class="clickable-row" style="top: 83%; height: 16%; left: 66.66%; width: 33.33%;" onclick="showPage(15)"></div>
                </div>
            </div>

            <!-- Contact info for page 16 -->
            <div id="contact-info" class="contact-info hidden">
                궁금하신 사항이나 스케쥴 변동이 있으시면 연락주세요<br>
                <a href="tel:051-726-0547" class="phone-link">📞 051-726-0547</a>
            </div>

            <!-- Back button for medicine detail pages -->
            <button id="back-btn" class="back-btn hidden" onclick="showPage(3)">← 뒤로가기</button>
            
            <!-- Button to see bowel pattern -->
            <button id="bowel-btn" class="bowel-btn hidden" onclick="showPage(8)">대변 양상 확인하기 →</button>
        </div>
    <script src="pdf-data.js?v=26"></script>
    <script src="app.js?v=26"></script>
</body>
</html>
